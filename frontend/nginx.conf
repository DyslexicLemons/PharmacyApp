server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service (Docker service name: backend)
    # In prod, a CloudFront behavior for /api/* pointing to the ALB serves the same purpose.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React Router — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted assets get long-lived cache headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Hide nginx version
    server_tokens off;
}
