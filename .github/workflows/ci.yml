name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Backend: pytest ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: pharmacy_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/pharmacy_test_db
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/pharmacy_test_db
          JWT_SECRET_KEY: ci-test-secret-key-not-used-in-prod
          ALLOWED_ORIGINS: http://localhost:5173
          UPLOAD_DIR: /tmp/pharmacy_uploads
        run: pytest

  # ── Frontend: build + vitest ─────────────────────────────────────────────────
  frontend-test:
    name: Frontend Build & Tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build (verify no compile errors)
        working-directory: frontend
        run: npm run build
