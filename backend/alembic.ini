# Alembic configuration for the Pharmacy API
# Run migrations from the backend/ directory:
#   alembic upgrade head
#   alembic revision --autogenerate -m "description"

[alembic]
script_location = alembic

# sqlalchemy.url is set programmatically in env.py from the DATABASE_URL env var.
# Do NOT hardcode credentials here.
sqlalchemy.url =

# Template for new revision files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
