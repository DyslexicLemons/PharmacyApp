[pytest]
testpaths = tests
pythonpath = .
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    unit: Pure unit tests — no DB or HTTP
    integration: Tests that hit the FastAPI TestClient + in-memory DB
    safety: Pharmacy safety tests (fill guards, quantity integrity)
    security: Security and input validation tests
    concurrency: Concurrency and race condition tests
    billing: Insurance and billing calculation tests
