services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: pharmacy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pharmacy-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:localpassword@postgres:5432/pharmacy_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-before-prod}
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost
      UPLOAD_DIR: /app/uploads
      REDIS_URL: redis://redis:6379
      LOG_RX_DEBUG: "true"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker ─────────────────────────────────────────────────────────────
  # Scale freely: docker compose up --scale celery-worker=N
  celery-worker:
    image: pharmacy-backend
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://postgres:localpassword@postgres:5432/pharmacy_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-before-prod}
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat scheduler ──────────────────────────────────────────────────
  # MUST remain a single replica — running two Beat instances causes duplicate
  # task dispatch. The Redis lock inside each task is a safety net only.
  celery-beat:
    image: pharmacy-backend
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      DATABASE_URL: postgresql://postgres:localpassword@postgres:5432/pharmacy_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-before-prod}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── React frontend (production build served by nginx) ────────────────────────
  # For hot-reload dev work, run `npm run dev` directly instead.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
